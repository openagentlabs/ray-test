## Guardrails configuration
## Active guardrails are defined in deploy/ai_gateway/config/guardrails.yaml (MIDAS-owned).
## Strategy: exlerate-no-grounding is default_on:true (all requests); the other 3 profiles
## are default_on:false (opt-in via request body, virtual key, or team assignment).
## Jenkinsfile_ORD5_litellm copies guardrails.yaml here before create_model_config.sh merges it.
guardrails: []

router_settings:
  routing_strategy: usage-based-routing-v2
  enable_pre_call_check: true

# environment_variables:
#   STORE_MODEL_IN_DB: 'True'
#   LITELLM_LOG: "DEBUG"

litellm_settings:
  cache: False
  debug: True
  detailed_debug: True
  max_budget: 1000.0
  budget_duration: 1mo
  max_internal_user_budget: 1000.0
  internal_user_budget_duration: "1mo"
  # Langfuse observability callback.
  # NOTE: since LiteLLM v1.82 the legacy `callbacks: ["langfuse"]` alias no
  # longer wires up the global success/failure loggers - you must declare
  # success_callback and failure_callback explicitly. Without this, any
  # request that does NOT carry a per-key metadata.logging override
  # (master-key traffic, Playground, untagged keys, internal LiteLLM
  # service calls) silently drops Langfuse tracing; only per-key overrides
  # keep working, which is how the AI-gateway default project went dark
  # after the v1.82 upgrade while Decision.ai kept receiving traces.
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  store_audit_logs: True
  # S3 callbacks - enabled after bucket creation at deploy time
  # success_callback: ["s3"]
  # failure_callback: ["s3"]
  # service_callback: ["s3"]
  
  # S3 callback params - defined at deploy time by Terraform
  s3_callback_params:
    s3_bucket_name: ""
    s3_region_name: ""
  
