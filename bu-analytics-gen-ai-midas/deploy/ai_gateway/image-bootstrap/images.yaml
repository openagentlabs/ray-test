  #   source:
  #     type: from_source
  #     context: ai_gateway/src/inference_api
  #     dockerfile: ai_gateway/CI/Dockerfile.inference-api
  #   target_ecr_repo: midas-aigtw-dev-inference-api
  #   target_tag: "1.0.0-midas-${BUILD_NUMBER}"
