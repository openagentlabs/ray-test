# MIDAS overlay for LiteLLM Helm chart (chart: oci://docker.litellm.ai/berriai/litellm-helm:1.81.13).
# Account: 811391286931 (ns-ai-midas-dev-use1-dev), region: us-east-1, cluster: midas-eks-aigtw-dev.
#
# This file is rendered by Jenkinsfile_ORD5_litellm AFTER the upstream
# ai_gateway/helm/litellm/values.yaml (sourced from the in-tree fork) so every
# key here wins.
#
# Goals:
#   - All secret/SA/configmap names match what ORD1 Terraform actually created
#     in the cluster (short upstream-style names: litellm-master-key, db-password,
#     langfuse-public-key, etc.) — NOT the verbose midas-aigtw-dev-* names that
#     the previous overlay assumed.
#   - Disable the secrets-store CSI volume (no SecretProviderClass exists yet —
#     all secrets are plain k8s Secrets created by ORD1).
#   - Image points at MIDAS ECR (zero JFrog at runtime).
#   - Ingress, ALB, certificate are wired by Jenkins from the litellm-alb-config
#     ConfigMap (per ORD4 pattern).
#
# What we do NOT override here:
#   - extraEnvVars  → upstream values.yaml has the full env block referencing
#     the short secret names; keeping it untouched means we get azure/vertex/
#     langfuse env wiring for free. PopulateMe placeholder secrets are tolerated
#     at boot (the proxy itself starts on master_key + db creds + license="").

image:
  repository: 811391286931.dkr.ecr.us-east-1.amazonaws.com/midas-aigtw-dev-litellm
  tag: v1.83.3-stable
  pullPolicy: IfNotPresent

# IRSA — ORD1 created this SA; matches what alb.tf binds to the IAM role.
serviceAccount:
  create: false
  name: midas-aigtw-dev-litellm-irsa

# Disable the upstream secrets-store-inline CSI mount — no SecretProviderClass
# exists in the cluster (ORD1 didn't deploy the CSI driver chain). The proxy
# reads its master key and salt from k8s Secret env vars instead, which is
# already wired in the upstream extraEnvVars block.
volumes: []
volumeMounts: []

# Drop the master-key file mount; force the proxy to read LITELLM_MASTER_KEY
# from the env var that the upstream values.yaml already populates.
masterkey: ""

# Reduce replicas for dev — saves cluster headroom while we iterate.
replicaCount: 2

resources:
  requests: { cpu: 250m, memory: 512Mi }
  limits:   { cpu: 1,    memory: 2Gi }

# Hosts are wired in the alb-values.yaml overlay generated by Jenkins from the
# litellm-alb-config ConfigMap (ACM_CERT_ARN, SUBNETS, AWS_ALB_SG). We override
# only the host, name, and group here.
ingress:
  enabled: true
  className: alb
  hosts:
    - host: exldecision-ai-dev-aigw-litellm.exlservice.com
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: litellm
              port:
                number: 4000
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: midas-aigtw-litellm
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /health/liveliness
    alb.ingress.kubernetes.io/healthcheck-port: "4000"
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=600
    alb.ingress.kubernetes.io/load-balancer-name: midas-aigtw-litellm-alb-dev

# No JFrog imagePullSecrets — node IAM role pulls from MIDAS ECR.
imagePullSecrets: []
