{{- if .Values.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
  annotations:
    # IRSA: the role ARN is injected by the pipeline from Terraform output
    # ec2_mt_test_irsa_role_arn. When the annotation is empty the pod still
    # starts but aws s3 cp will fail with AccessDenied.
    eks.amazonaws.com/role-arn: {{ .Values.irsaRoleArn | default "" | quote }}
{{- end }}
