apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Default Kubernetes progress deadline is 600s; this workload can exceed that
  # window during image pull/startup under node churn, which marks rollout failed.
  progressDeadlineSeconds: {{ .Values.progressDeadlineSeconds }}
  {{- /* RollingUpdate default maxSurge 25% yields +1 pod for replicaCount=1; cap at one pod during rollouts. */}}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        {{- with .Values.rollout.suffix }}
        midas.midas.io/rollout-suffix: {{ . | quote }}
        {{- end }}
      {{- with .Values.rollout.suffix }}
      annotations:
        midas.midas.io/rollout-suffix: {{ . | quote }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          env:
            - name: PORT
              value: {{ .Values.containerPort | quote }}
            - name: BACKEND_UPSTREAM
              value: {{ .Values.backendUpstream | quote }}
          livenessProbe:
            httpGet:
              path: /kube-health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /kube-health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
