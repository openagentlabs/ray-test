{{- if .Values.appSecret.create }}
# Kubernetes Secret populated from values (for local/manual Helm deploys).
# In production, create this secret externally (e.g. via populate-secrets.sh + kubectl)
# and set appSecret.create=false (the default).
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.appSecret.secretName }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.appSecret.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
