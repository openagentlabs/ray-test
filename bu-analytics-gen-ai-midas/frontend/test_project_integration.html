<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Integration Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
        .response { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Project Management API Test</h1>
        
        <div>
            <h2>Authentication</h2>
            <div>
                <input type="text" id="username" placeholder="Username" value="testuser">
                <input type="password" id="password" placeholder="Password" value="testpass123">
                <button onclick="login()">Login</button>
                <button onclick="logout()">Logout</button>
            </div>
            <div id="auth-status"></div>
        </div>

        <div>
            <h2>Project Management</h2>
            <div>
                <input type="text" id="projectName" placeholder="Project Name" value="Test Project">
                <textarea id="projectDesc" placeholder="Project Description" rows="3">This is a test project created from the test page.</textarea>
                <button onclick="createProject()">Create Project</button>
                <button onclick="getProjects()">Get Projects</button>
            </div>
            <div id="project-results"></div>
        </div>

        <div>
            <h2>Response Log</h2>
            <div id="response-log"></div>
        </div>
    </div>

    <script>
        let authToken = localStorage.getItem('auth_token');
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('response-log');
            const entry = document.createElement('div');
            entry.className = type;
            entry.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateAuthStatus() {
            const statusDiv = document.getElementById('auth-status');
            if (authToken) {
                statusDiv.innerHTML = `<span class="success">✓ Authenticated</span>`;
            } else {
                statusDiv.innerHTML = `<span class="error">✗ Not authenticated</span>`;
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.access_token;
                    localStorage.setItem('auth_token', authToken);
                    log(`Login successful: ${data.user.full_name}`, 'success');
                    updateAuthStatus();
                } else {
                    log(`Login failed: ${data.detail}`, 'error');
                }
            } catch (error) {
                log(`Login error: ${error.message}`, 'error');
            }
        }

        function logout() {
            authToken = null;
            localStorage.removeItem('auth_token');
            log('Logged out', 'success');
            updateAuthStatus();
        }

        async function createProject() {
            if (!authToken) {
                log('Please login first', 'error');
                return;
            }

            const name = document.getElementById('projectName').value;
            const description = document.getElementById('projectDesc').value;
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/projects', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ name, description })
                });

                const data = await response.json();
                
                if (response.ok) {
                    log(`Project created successfully: ${data.project.name} (ID: ${data.project.id})`, 'success');
                    document.getElementById('project-results').innerHTML = 
                        `<div class="response"><strong>Created Project:</strong><br>${JSON.stringify(data.project, null, 2)}</div>`;
                } else {
                    log(`Project creation failed: ${data.detail}`, 'error');
                }
            } catch (error) {
                log(`Project creation error: ${error.message}`, 'error');
            }
        }

        async function getProjects() {
            if (!authToken) {
                log('Please login first', 'error');
                return;
            }
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/projects', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    log(`Retrieved ${data.projects.length} projects`, 'success');
                    const projectsList = data.projects.map(p => 
                        `<li><strong>${p.name}</strong> (${p.id}) - ${p.description || 'No description'}</li>`
                    ).join('');
                    document.getElementById('project-results').innerHTML = 
                        `<div class="response"><strong>Projects (${data.total_count} total):</strong><ul>${projectsList}</ul></div>`;
                } else {
                    log(`Get projects failed: ${data.detail}`, 'error');
                }
            } catch (error) {
                log(`Get projects error: ${error.message}`, 'error');
            }
        }

        // Initialize
        updateAuthStatus();
        log('Project API test page loaded. Please login first.');
    </script>
</body>
</html>
