# backend_pool_node — per-node identity via BACKEND_POOL_NODE_NAME (downward API).
# DNS: backend-pool-node-0.backend-pool-node.<namespace>.svc.cluster.local:8080
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: backend-pool-node
  namespace: routing
  labels:
    app: backend-pool-node
spec:
  serviceName: backend-pool-node
  replicas: 3
  selector:
    matchLabels:
      app: backend-pool-node
  template:
    metadata:
      labels:
        app: backend-pool-node
    spec:
      containers:
        - name: backend-pool-node
          image: <ACCOUNT>.dkr.ecr.<REGION>.amazonaws.com/backend-pool-node:0.1.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: BACKEND_POOL_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-pool-node
  namespace: routing
  labels:
    app: backend-pool-node
spec:
  clusterIP: None
  selector:
    app: backend-pool-node
  ports:
    - name: http
      port: 8080
      targetPort: http
