{{- if .Values.backendPool.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: backend-pool-node
  namespace: {{ .Values.namespace }}
  labels:
    app: backend-pool-node
spec:
  serviceName: backend-pool-node
  replicas: {{ .Values.backendPool.replicaCount }}
  selector:
    matchLabels:
      app: backend-pool-node
  template:
    metadata:
      labels:
        app: backend-pool-node
    spec:
      containers:
        - name: backend-pool-node
          image: "{{ required "backendPool.image.repository is required" .Values.backendPool.image.repository }}:{{ .Values.backendPool.image.tag }}"
          imagePullPolicy: {{ .Values.backendPool.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: BACKEND_POOL_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backendPool.resources | nindent 12 }}
{{- end }}
