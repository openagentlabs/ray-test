{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "routing-tier.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "routing-tier.labels" . | nindent 4 }}
  annotations:
    {{- include "routing-tier.albAnnotations" . | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - {{- if .host }}
      host: {{ .host | quote }}
      {{- end }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "routing-tier.fullname" $ }}
                port:
                  number: {{ $.Values.service.trafficPort }}
          {{- end }}
    {{- end }}
{{- end }}
