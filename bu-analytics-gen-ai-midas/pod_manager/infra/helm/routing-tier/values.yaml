# Default values for routing-tier.
# After `terraform apply`, set image repositories from output `ecr_repository_urls`
# and `serviceAccount.roleArn` from `pod_manager_irsa_role_arn`.

nameOverride: ""
fullnameOverride: envoy-router

namespace: routing
createNamespace: true

serviceName: router-svc

global:
  awsRegion: us-east-1
  deployTarget: local

serviceAccount:
  create: true
  name: pod-manager
  annotations: {}
  # IRSA — set from terraform output pod_manager_irsa_role_arn
  roleArn: ""

rbac:
  create: true

replicaCount: 3

imagePullSecrets: []

envoy:
  image:
    repository: "" # e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/envoy-router
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # Optional — passed to envoy/docker-entrypoint.sh (see envoy/envoy.yaml.template)
  env: {}
    # ENVOY_EXT_AUTHZ_TIMEOUT: "0.5s"
    # ENVOY_EXT_AUTHZ_PORT: "9000"

podManager:
  image:
    repository: "" # e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/router-svc
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  grpcPort: 8804
  extAuthzPort: 9000
  logLevel: INFO
  env: {}
  kubernetes:
    podLabelSelector: app=backend-pool-node
    headlessServiceName: backend-pool-node
    backendPort: 8080
  reconciliation:
    enabled: true
    intervalSec: 30
  auth:
    devMode: true
    devSubHeader: x-test-sub
    sessionCookieName: pod_manager_user
  loginPodPool:
    routingUpstream: login-pod:8080
  reaper:
    enabled: true
    intervalSec: 60
    idleTtlSec: 900
  cognito:
    enabled: false
    issuer: ""
    audience: ""
    jwksUri: ""
  envoyManagement:
    enabled: false
  postgres:
    # Dedicated schema that owns routing-tier tables (isolated from the backend's public schema).
    schemaName: pod_manager
    # Prefix for routing-tier tables in the shared backend Postgres database.
    tablePrefix: pm_
    poolMin: 1
    poolMax: 10
    commandTimeoutSec: 10
  # DATABASE_URL is injected from an existing Kubernetes Secret (not created by this chart).
  # Create it once, e.g.:
  #   kubectl -n routing create secret generic pod-manager-db \
  #     --from-literal=DATABASE_URL=postgresql://user:pass@host:5432/db
  databaseUrlSecret:
    name: pod-manager-db
    key: DATABASE_URL

podAnnotations: {}
podLabels: {}

topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway

service:
  trafficPort: 80
  trafficTargetPort: 10000
  healthPort: 8080

ingress:
  enabled: false
  className: alb
  scheme: internet-facing
  listeners:
    http:
      enabled: true
      port: 80
    https:
      enabled: false
      port: 443
      certificateArn: ""
      sslRedirect: false
  annotations: {}
  hosts:
    - paths:
        - path: /
          pathType: Prefix

grpcIngress:
  enabled: false
  type: nlb
  port: 8804
  scheme: internet-facing

backendPool:
  enabled: true
  replicaCount: 3
  image:
    repository: ""
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60

pdb:
  enabled: true
  minAvailable: 2

loginPod:
  enabled: true
  replicaCount: 2
  image:
    repository: "" # e.g. <ACCOUNT>.dkr.ecr.us-east-1.amazonaws.com/login-pod
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  servicePort: 8080
  sessionCookieName: pod_manager_user
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

terminationGracePeriodSeconds: 30
