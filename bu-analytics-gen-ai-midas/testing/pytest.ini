[pytest]
minversion = 8.0
testpaths = integration
norecursedirs = *.egg .eggs dist build node_modules .git __pycache__ .venv .hypothesis
pythonpath = ..
env_files =
    .env
markers =
    slow: long-running or large surface tests
    schemathesis: contract tests driven from generated OpenAPI stub
    auth: authentication and session tests
    projects: project CRUD tests
    upload: dataset upload and management tests
    chunked_upload: chunked upload lifecycle tests
    insights: insight job and analytics tests
    rfe: RFE async job lifecycle tests
    documentation: documentation generation endpoint tests
    segmentation: segmentation endpoint tests
    validation: cross-cutting validation error contract tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::urllib3.exceptions.InsecureRequestWarning
