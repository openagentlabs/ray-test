# MIDAS Scenario 1 — PRD from developer/business intake

[workflow]

persistent_facts = [
  "Feature slug: use Jira ticket ID or short kebab-case name (e.g. woe-export, MIDAS-42). Pick at intake; reuse unchanged in planning-artifacts/<slug>/, specs/spec-<slug>/, epics/<slug>/, implementation-artifacts/<slug>/.",
  "file:{project-root}/_bmad-output/scenarios/01-requirements-traceability.md",
  "Scenario 1: Number every requirement REQ-001, REQ-002, … in the PRD. Each must cite intake source file and section.",
  "Output PRD to _bmad-output/planning-artifacts/<slug>/prd.md unless intake already is a complete PRD (then validate and add REQ IDs only).",
  "Include Test strategy section listing expected pytest/Vitest surfaces per REQ group.",
]
