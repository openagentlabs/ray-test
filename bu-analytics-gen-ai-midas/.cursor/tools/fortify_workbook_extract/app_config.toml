# Fortify workbook extract — application defaults (edit paths for your repo clone).

[app]
name = "Fortify Developer Workbook Extract"
tool_id = "parse_isg_code_scan_report_tool"

[paths]
# Default repo-relative location for per-issue analysis markdown (see jp_isg skill).
analysis_log_dir = "remediation/security_remediation/analysis_log"

[formatter]
schema_version = "1.3"

[extraction]
normalize_paths_default = true
strip_prefixes = [
    "Downloads/bu-analytics-gen-ai-midas-deployment-dev-jenkins/",
    "bu-analytics-gen-ai-midas-deployment-dev-jenkins/",
]

[output]
default_format = "csv"
