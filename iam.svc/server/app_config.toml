# iam.svc — gRPC + DynamoDB. Table names mirror Terraform outputs (infra/aws_tf).
# Regenerate: node infra/aws_tf/scripts/sync-cloudwatch-logging-defaults.mjs
# Override path with IAM_APP_CONFIG_PATH.

[app]
service_name = "iam-service"
log_level = "DEBUG"
version = "0.1.0"

[observability.identity]
service_id = "arb-iam-svc"
service_name = "arb-iam-svc"
service_version = "0.1.0"
instance_id = "local"
environment = "dev"

[observability.logging]
enabled = true
driver = "cloudwatch"
level = "DEBUG"

[observability.security_logging]
enabled = true
driver = "cloudwatch"
level = "INFO"

[observability.tracing]
enabled = false
driver = "cloudwatch"
sample_rate = 1.0

[observability.metrics]
enabled = false
driver = "cloudwatch"
namespace = "EXL/IAM"

[observability.apm]
enabled = false
driver = "cloudwatch"

[observability.drivers.cloudwatch_logging]
region = "us-east-1"
log_group_name = "/arb/arb_ai_assistant/services/iam_svc"
log_stream_prefix = "iam-svc"
queue_max_size = 10000

[observability.drivers.cloudwatch_security_logging]
region = "us-east-1"
log_group_name = "/arb/arb_ai_assistant/security/iam_svc"
log_stream_prefix = "iam-security"
queue_max_size = 5000

[observability.drivers.cloudwatch_tracing]
region = "us-east-1"
segment_name = "arb-iam-svc"

[observability.drivers.cloudwatch_metrics]
region = "us-east-1"
namespace = "EXL/IAM"
queue_max_size = 10000

[observability.drivers.cloudwatch_apm]
region = "us-east-1"
log_group_name = "/arb/arb_ai_assistant/apm/iam_svc"
log_stream_prefix = "iam-apm"
queue_max_size = 5000

[api_service]
host = "0.0.0.0"
port = 8803

[http_auth]
enabled = true
host = "0.0.0.0"
port = 8873
public_base_url = "http://127.0.0.1:8873"
cors_allow_origins = ["http://127.0.0.1:8811", "http://localhost:8811"]

[vault]
driver = "local"
master_key_id = "iam-master-key-1"

[vault.local]
vault_path = "./vault"

# Example AWS vault driver (disabled — switch driver to "aws" to enable).
# [vault.aws]
# region = "us-east-1"
# account_id = "017868795096"

[idp]
driver = "hardcoded"

[idp.hardcoded]
provider_id = "hardcoded-test"
display_name = "Hardcoded Test IdP"

[[idp.hardcoded.users]]
email = "keith.tobin@gmail.com"
password = "123456"

[dynamodb]
region = "us-east-1"
endpoint_url = ""

[dynamodb.tables]
users = "arb-ai-assistant-iam-users-017868795096"
user_types = "arb-ai-assistant-iam-user-types-017868795096"
login_types = "arb-ai-assistant-iam-login-types-017868795096"
logins = "arb-ai-assistant-iam-logins-017868795096"
skill_lists = "arb-ai-assistant-iam-skill-lists-017868795096"
skills = "arb-ai-assistant-iam-skills-017868795096"
user_skills = "arb-ai-assistant-iam-user-skills-017868795096"
sessions = "arb-ai-assistant-iam-sessions-017868795096"
invites = "arb-ai-assistant-iam-invites-017868795096"
deployment_admin = "arb-ai-assistant-iam-deployment-admin-017868795096"
roles = "arb-ai-assistant-iam-roles-017868795096"
permissions = "arb-ai-assistant-iam-permissions-017868795096"
role_permissions = "arb-ai-assistant-iam-role-permissions-017868795096"
user_role_assignments = "arb-ai-assistant-iam-user-role-assignments-017868795096"
service_permissions = "arb-ai-assistant-iam-service-permissions-017868795096"
service_function_registry = "arb-ai-assistant-iam-service-function-registry-017868795096"
user_permissions = "arb-ai-assistant-iam-user-permissions-017868795096"
auth_sessions = "arb-ai-assistant-iam-auth-sessions-017868795096"
