replicaCount: 1

image:
  repository: placeholder
  tag: "latest"
  pullPolicy: IfNotPresent

# Wire at deploy time:
# - serviceAccount with IRSA annotation to `terraform output iam_arch_diagram_agent_bedrock_role_arn`
# - env: AWS_REGION (must match `app_config.toml` `[agent.bedrock].region` and Terraform `aws_region`),
#   optional ARCH_DIAGRAM_AGENT_SERVICE_GRPC_PORT (default 8810 in app_config.toml); mount app_config.toml
# - ConfigMap/volume for `app_config.toml`: keep `[agent.bedrock]` ids in sync with Terraform outputs
#   `arch_diagram_agent_bedrock_foundation_model_id`, `arch_diagram_agent_bedrock_inference_profile_id`,
#   and `arch_diagram_agent_bedrock_invoke_resource_arns` (IAM must include every model/profile you call).
# - DynamoDB: set ARCH_DIAGRAM_AGENT_CONVERSION_JOBS_DYNAMO_TABLE_NAME from
#   `terraform output ddb_arch_diagram_conversion_jobs_table_name`.
# - Integrations (ECS sets these via Terraform locals): ARCH_DIAGRAM_AGENT_DOCUMENT_STORAGE_ENABLED=true,
#   ARCH_DIAGRAM_AGENT_DOCUMENT_STORAGE_GRPC_HOST, ARCH_DIAGRAM_AGENT_STORAGE_ENABLED=true,
#   ARCH_DIAGRAM_AGENT_STORAGE_GRPC_HOST (Cloud Map hosts for document-storage and storage workloads).
