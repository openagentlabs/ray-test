apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arb-workload.fullname" . }}
  labels:
    {{- include "arb-workload.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "arb-workload.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arb-workload.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      # Prevent legacy Service env vars (e.g. IAM_SERVICE_HOST=<ClusterIP>) from overriding gRPC bind hosts.
      enableServiceLinks: false
      serviceAccountName: {{ include "arb-workload.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
