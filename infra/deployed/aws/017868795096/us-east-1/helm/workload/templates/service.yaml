apiVersion: v1
kind: Service
metadata:
  name: {{ include "arb-workload.fullname" . }}
  labels:
    {{- include "arb-workload.labels" . | nindent 4 }}
  {{- if .Values.service.exposeLoadBalancer }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
  {{- end }}
spec:
  type: {{ if .Values.service.exposeLoadBalancer }}LoadBalancer{{ else }}ClusterIP{{ end }}
  selector:
    {{- include "arb-workload.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
