apiVersion: v1
kind: Service
metadata:
  name: {{ include "arb-workload.fullname" . }}
  labels:
    {{- include "arb-workload.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "arb-workload.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
