apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "arb-workload.serviceAccountName" . }}
  labels:
    {{- include "arb-workload.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
