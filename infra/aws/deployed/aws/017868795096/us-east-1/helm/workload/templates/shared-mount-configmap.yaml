{{- if and .Values.sharedMounts.initWaitEnabled (or .Values.lustre.enabled .Values.s3SharedFiles.enabled) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "arb-workload.fullname" . }}-shared-mount-health
  labels:
    {{- include "arb-workload.labels" . | nindent 4 }}
data:
  probe-mounts.sh: |
    #!/bin/sh
    set -eu
    MAX_ATTEMPTS="${PROBE_MAX_ATTEMPTS:-5}"
    BASE_DELAY_MS=400
    MOUNT_PATHS="${MOUNT_PATHS:-}"
    probe_one() {
      path="$1"
      attempt=1
      while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do
        if [ -d "$path" ] && ls "$path" >/dev/null 2>&1; then
          probe_file="${path}/.mount-health-probe"
          if touch "$probe_file" 2>/dev/null; then
            rm -f "$probe_file"
            return 0
          fi
          return 0
        fi
        attempt=$((attempt + 1))
        sleep "$(awk -v attempt="$attempt" -v base="$BASE_DELAY_MS" 'BEGIN {printf "%.3f", attempt * base / 1000}')"
      done
      echo "mount probe failed: $path" >&2
      return 1
    }
    OLDIFS="$IFS"
    IFS=','
    for path in $MOUNT_PATHS; do
      if [ -n "$path" ]; then
        probe_one "$path" || exit 1
      fi
    done
    IFS="$OLDIFS"
    exit 0
  wait-for-mounts.sh: |
    #!/bin/sh
    set -eu
    MAX_WAIT_SEC="${MAX_WAIT_SEC:-600}"
    INTERVAL=10
    elapsed=0
    while [ "$elapsed" -lt "$MAX_WAIT_SEC" ]; do
      if /scripts/probe-mounts.sh; then
        echo "shared mounts ready"
        break
      fi
      sleep "$INTERVAL"
      elapsed=$((elapsed + INTERVAL))
    done
    if [ "$elapsed" -ge "$MAX_WAIT_SEC" ]; then
      echo "shared mounts not ready after ${MAX_WAIT_SEC}s" >&2
      exit 1
    fi
    RUN_AS_UID="${RUN_AS_UID:-1000}"
    RUN_AS_GROUP="${RUN_AS_GROUP:-1000}"
    for dir in ${WORKLOAD_WRITE_DIRS:-}; do
      if [ -n "$dir" ]; then
        mkdir -p "$dir"
        chown "${RUN_AS_UID}:${RUN_AS_GROUP}" "$dir" 2>/dev/null || true
      fi
    done
    exit 0
{{- end }}
