{{- if .Values.service.exposeLoadBalancer }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "arb-workload.fullname" . }}
  labels:
    {{- include "arb-workload.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.albGroupName | quote }}
    alb.ingress.kubernetes.io/listen-ports: {{ .Values.ingress.listenPorts | quote }}
    {{- with .Values.ingress.healthcheckPath }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ . | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "arb-workload.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
